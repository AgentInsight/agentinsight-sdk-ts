name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test-integration:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    env:
      AGENTINSIGHT_BASE_URL: "http://localhost:3000"
      AGENTINSIGHT_SECRET_KEY: "sk-ai-placeholder"
      AGENTINSIGHT_PUBLIC_KEY: "pk-ai-placeholder"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:integration

  lint:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - run: pnpm install --frozen-lockfile
      - name: Verify lockfile integrity
        run: |
          git diff --exit-code pnpm-lock.yaml || {
            echo "❌ Error: pnpm-lock.yaml was modified during install"
            exit 1
          }
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm typecheck

  all-checks-passed:
    runs-on: ubuntu-latest
    needs: [test-integration, lint]
    if: always()
    steps:
      - name: Successful
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: exit 0
      - name: Failing
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1
