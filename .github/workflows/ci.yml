name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test-integration:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    env:
      AGENTINSIGHT_BASE_URL: "http://localhost:3000"
      AGENTINSIGHT_SECRET_KEY: "sk-ai-placeholder"
      AGENTINSIGHT_PUBLIC_KEY: "pk-ai-placeholder"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:integration

  lint:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24

      - run: pnpm install --frozen-lockfile
      - name: Verify lockfile integrity
        run: |
          git diff --exit-code pnpm-lock.yaml || {
            echo "❌ Error: pnpm-lock.yaml was modified during install"
            exit 1
          }
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm typecheck

  all-checks-passed:
    runs-on: ubuntu-latest
    needs: [test-integration, lint]
    if: always()
    steps:
      - name: Successful
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: exit 0
      - name: Failing
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1
